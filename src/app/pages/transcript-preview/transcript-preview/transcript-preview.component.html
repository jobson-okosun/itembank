<div class="container" *ngIf="!downloadingTranscript">
    <!-- candidate data -->
    <div>
        <div class="d-flex align-items-center justify-content-between">
            <h4 class="mt-3">TRANSCRIPT</h4>
        </div>
        <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
            <div class="d-flex gap-5 justify-content-between align-items-center">
                <div class="d-flex gap-2 align-items-center">
                    <div
                        class="rounded-circle d-flex flex-colum align-items-center justify-content-center bg-soft-secondary"
                        style="width: 50px; height: 50px">
                        <span class="fs-12 fw-bold text-uppercase">
                          {{ params.name?.substr(0, 2)?.toUpperCase() }}
                        </span>
                    </div>
                    <div>
                        <div class="fs-14 fw-bold" *ngIf="params?.name"> {{ params.name }} </div>
                        <span class="small" *ngIf="params?.loginField"> {{ params.loginField }} </span>
                    </div>
                </div>
                <div class="d-flex justify-content-between gap-3">
                    <div>
                        <h6>Total questions</h6>
                        <div class="small fw-bold fs-12"> {{ transcriptData?.length ?? 0 }} </div>
                    </div>
                    <div>
                        <h6>Score</h6>
                        <div class="small fw-bold fs-12"> {{ transcriptScore }} </div>
                    </div>
                </div>
            </div>
            <div>
                <div class="d-flex align-items-center gap-1">
                    <div class="small" *ngIf="params?.sectionName"> {{ params.sectionName }} </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Question -->
    <ng-container *ngFor="let item of transcriptData; let i = index">
        <mcq 
            *ngIf="item.item_score?.item_type === transcriptQuestionTypes.MCQ"
            [currentQuestion]="item"
            [currentQuestionIndex]="i + 1"
        ></mcq>
        <app-close-dropdown 
            *ngIf="item.item_score?.item_type === transcriptQuestionTypes.CLOZE_DROPDOWN"
            [currentQuestion]="item"
            [currentQuestionIndex]="i + 1"
        ></app-close-dropdown>
    </ng-container>
</div>

<div id="domready" *ngIf="transcriptData"></div>
