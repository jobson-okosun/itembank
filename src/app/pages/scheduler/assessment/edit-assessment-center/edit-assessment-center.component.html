<ng-template #editParticipantModal let-modal>
  <div
    *ngIf="fetchingParticipantForEdit"
    class="d-flex align-items-center justify-content-center"
    style="height: 60vh"
  >
    <div class="d-flex align-items-center gap-2">
      <div class="spinner-border text-info fs-18" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <span class="text-info text-center fs-16 flex-grow-1 ms-2"
        >Loading participant info...</span
      >
    </div>
  </div>

  <ng-container *ngIf="participantForEdit && !fetchingParticipantForEdit">
    <div class="modal-header">
      <h2>Edit Participant Details</h2>
    </div>

    <div class="modal-body">
      <div class="row">
        <div class="col-6">
          <div class="mb-3">
            <label for="" class="form-label">Center ID</label>
            <input
              type="text"
              class="form-control"
              name="centerId"
              disabled
              value="{{ participantForEdit.centerId }}"
            />
          </div>
        </div>
        <div class="col-6">
          <div class="mb-3">
            <label for="" class="form-label">Group Name</label>
            <input
              type="text"
              class="form-control"
              name="centerId"
              disabled
              value="{{ participantForEdit.groupName }}"
            />
          </div>
        </div>
        <div class="col-6 mb-2">
          <label class="form-check-label" for="Suspended">
            Suspended :
            <span
              *ngIf="!participantForEdit.suspended"
              class="badge badge-outline-success"
              >{{ participantForEdit.suspended }}</span
            >
            <span
              *ngIf="participantForEdit.suspended"
              class="badge badge-outline-danger"
              >{{ participantForEdit.suspended }}</span
            >
          </label>
        </div>
      </div>

      <form
        [formGroup]="form"
        *ngIf="participantForEdit"
        (ngSubmit)="onSubmit()"
      >
        <div class="row">
          <div
            *ngFor="let key of keys(participantForEdit.fields)"
            class="col-6 mb-3"
          >
            <div>
              <label [for]="participantForEdit.fields[key].field_id">{{
                participantForEdit.fields[key].field_name
              }}</label>
              <input
                *ngIf="participantForEdit.fields[key].field_type === 'TEXTBOX'"
                [formControlName]="participantForEdit.fields[key].field_name"
                [id]="participantForEdit.fields[key].field_id"
                type="text"
                class="form-control"
                [placeholder]="participantForEdit.fields[key].field_name"
              />
              <select
                *ngIf="participantForEdit.fields[key].field_type === 'SELECT'"
                [formControlName]="participantForEdit.fields[key].field_name"
                [id]="participantForEdit.fields[key].field_id"
                class="form-control"
              >
                <option
                  *ngFor="
                    let option of participantForEdit.fields[key].field_values
                  "
                  [value]="option"
                  [selected]="participantForEdit.fields[key].field_value === option"
                >
                  {{ option }}
                </option>
              </select>

              <input
                *ngIf="participantForEdit.fields[key].field_type === 'CALENDAR'"
                class="form-control flatpickr-input"
                [placeholder]="participantForEdit.fields[key].field_name"
                type="text"
                name="calendar"
                required
                mwlFlatpickr
                data-id="datetime"
                [type]="'date'"
                [altInput]="false"
                [enableTime]="false"
                [convertModelValue]="true"
                [altFormat]=""
                [dateFormat]="'Y-m-d H:i'"
                [(ngModel)]="dateToEdit"
                [formControlName]="participantForEdit.fields[key].field_name"
              />
            </div>
          </div>
          <div class="d-flex justify-content-end gap-4">
            <span class="btn btn-danger" (click)="cancel()">Close</span>
            <button
              type="submit"
              [disabled]="processingEdit"
              class="btn btn-primary"
            >
              <span *ngIf="!processingEdit">Submit</span>
              <span *ngIf="processingEdit">Processing...</span>
            </button>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer"></div>
  </ng-container>
</ng-template>

<ng-template #moveParticipantToGroupModal role="document" let-modal>
  <div class="card">
    <h5 class="card-header">Move to new section group</h5>
    <div class="card-body">
      <form action="javascript:void(0);">
        <div class="row">
          <ng-container>
            <div class="col-lg-12">
              <div class="mb-3">
                <label for="contactInput" class="form-label"
                  >Section Name</label
                >

                <ng-select
                  class="custom"
                  [items]="assessmentSectionGroups.sectionGroups"
                  bindLabel="groupName"
                  bindValue="id"
                  name="section"
                  dropdownPosition="bottom"
                  [(ngModel)]="sectionGroupIdToMoveParticipantsTo"
                >
                  <ng-template ng-optgroup-tmp let-item="item" let-i="index">
                    {{ item[i].subjectName | uppercase }}
                  </ng-template>
                </ng-select>
              </div>
            </div>

            <div class="col-lg-12">
              <div class="hstack gap-2 justify-content-end">
                <button
                  type="submit"
                  class="btn btn-primary"
                  (click)="moveParticipantsToAnotherSectionGroup()"
                  [disabled]="!sectionGroupIdToMoveParticipantsTo"
                >
                  Move
                </button>
                <button
                  type="button"
                  class="btn btn-soft-danger"
                  (click)="cancel()"
                >
                  Cancel
                </button>
              </div>
            </div>
          </ng-container>

          <!--end col-->
        </div>
        <!--end row-->
      </form>
    </div>
  </div>
</ng-template>
