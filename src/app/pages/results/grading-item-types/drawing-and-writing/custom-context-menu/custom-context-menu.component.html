<div class="custom-context-menu card border" [class.show]="isVisible" [style.left.px]="x" [style.top.px]="y">
    <h5 class="px-3 py-2 text-black">Select Section</h5>
    <div class="flex flex-col">
        <div class="content-option" *ngFor="let item of sections" (click)="menuItemClicked(item.id);$event.preventDefault()"> {{ item.name }}</div>
    </div>
</div>
