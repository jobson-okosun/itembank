<form *ngIf="itemUtil.previewItem === false" #itemForm="ngForm">

    <div class="card-body">
      <div class="d-flex flex-wrap justify-content-between mb-5">
        <h3 class="card-title">
          {{ selectedItemType }} |
          <span class="text-muted">{{ formType }}</span>
        </h3>
        <div class="d-flex flex-wrap gap-2 float-end">
          <button
            type="button"
            class="btn btn-outline-success waves-effect waves-light"

          </button>

          <!-- <button
            (click)="viewPassage(passageModal)"

            *ngIf="passageWorkFlow === true"
          >
            View Passage
          </button> -->
          <button
            type="button"
            *ngIf="passageId"

            View Passage

          <!-- <button
            type="button"

            (click)="updateItem(itemForm)"
          >
            Save
          </button> -->

            *ngIf="editData && currentUser.authorities.includes('AUTHOR')"

            role="group"
            ngbDropdown
          >
            <button
              id="btnGroupDrop1"
              type="button"
              class="btn btn-primary dropdown-toggle arrow-none"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              ngbDropdownToggle
            >
              Save <i class="mdi mdi-chevron-down"></i>
            </button>
            <ul
              class="dropdown-menu"
              aria-labelledby="btnGroupDrop1"
              ngbDropdownMenu
            >
              <li style="cursor: pointer">
                <a class="dropdown-item" (click)="updateItem(itemForm, 'save')"
                  >Save</a
                >
              </li>
              <li style="cursor: pointer">
                <a class="dropdown-item" (click)="saveToDraft()"
                  >Save as draft</a
                >
              </li>
              <!-- <li style="cursor: pointer">
            <a class="dropdown-item" (click)="saveAndNew()">Save and new</a>
          </li> -->
              <!-- <li style="cursor: pointer">
            <a
              *ngIf="passageWorkFlow === true"
              class="dropdown-item"
              (click)="saveItemToPassage(itemForm)"
              >Save to passage</a
            >
          </li> -->
            </ul>
          </div>

          <!-- <div
            class="d-flex gap-2"
            *ngIf="
              editData &&
              (currentUser.authorities.includes('MODERATOR') ||
                currentUser.authorities.includes('ADMIN'))
            "
          >
            <button
              *ngIf="editData.itemStatus === 'AWAITING_MODERATION'"
              type="button"
              class="btn btn-soft-danger"
              (click)="openRejectionReasonModal(rejectionModal)"
            >
              <i class="ri-close-circle-line align-middle me-2"></i>Reject
            </button>
            <button
              *ngIf="editData.itemStatus === 'AWAITING_MODERATION'"
              type="button"
              class="btn btn-soft-success"
              (click)="approveQuestion()"
            >
              <i class="ri-double-check-line align-middle me-2"></i>Approve
            </button>
          </div> -->

          <div
            ngbDropdown
            class="d-flex gap-2"
            *ngIf="
              editData &&
              (currentUser.authorities.includes('MODERATOR') ||
                currentUser.authorities.includes('ADMIN'))
            "
          >
            <button
              id="btnGroupDrop3"
              type="button"
              class="btn btn-primary dropdown-toggle arrow-none"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              ngbDropdownToggle
            >
              Save <i class="mdi mdi-chevron-down"></i>
            </button>
            <ul
              class="dropdown-menu"
              aria-labelledby="btnGroupDrop3"
              ngbDropdownMenu
            >
              <li
                style="cursor: pointer"
                *ngIf="editData.itemStatus === 'AWAITING_MODERATION'"
                (click)="approveQuestion(itemForm)"
              >
                <a class="dropdown-item">Approve</a>
              </li>

              <li
                style="cursor: pointer"
                *ngIf="editData.itemStatus === 'PUBLISHED'"
                (click)="approveQuestion(itemForm)"
              >
                <a class="dropdown-item">Save</a>
              </li>
              <li
                *ngIf="editData.itemStatus === 'AWAITING_MODERATION'"
                style="cursor: pointer"
                (click)="openRejectionReasonModal(rejectionModal)"
              >
                <a class="dropdown-item">Reject</a>
              </li>
            </ul>

            <!--  -->

            <!-- <button
            *ngIf="editData.itemStatus === 'AWAITING_MODERATION'"
            type="button"
            class="btn btn-soft-danger"
            (click)="openRejectionReasonModal(rejectionModal)"
          >
            <i class="ri-close-circle-line align-middle me-2"></i>Reject
          </button>
          <button
            *ngIf="editData.itemStatus === 'AWAITING_MODERATION'"
            type="button"
            class="btn btn-soft-success"
            (click)="approveQuestion()"
          >
            <i class="ri-double-check-line align-middle me-2"></i>Approve
          </button> -->
          </div>

          <div *ngIf="!editData" class="btn-group" role="group" ngbDropdown>
            <button
              id="btnGroupDrop1"
              type="button"
              class="btn btn-primary dropdown-toggle arrow-none"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              ngbDropdownToggle
            >
              Save <i class="mdi mdi-chevron-down"></i>
            </button>
            <ul
              class="dropdown-menu"
              aria-labelledby="btnGroupDrop1"
              ngbDropdownMenu
            >
              <li style="cursor: pointer">
                <a class="dropdown-item" (click)="save(itemForm)">Save</a>
              </li>
              <li style="cursor: pointer">
                <a class="dropdown-item" (click)="saveToDraft()"
                  >Save as draft</a
                >
              </li>
              <li style="cursor: pointer">
                <a class="dropdown-item" (click)="saveAndNew()">Save and new</a>
              </li>

              <!-- <li style="cursor: pointer">
                <a
                  *ngIf="passageWorkFlow === true"
                  class="dropdown-item"
                  (click)="saveItemToPassage(itemForm)"
                  >Save to passage</a
                >
              </li> -->
            </ul>
          </div>
        </div>
      </div>

      <app-passage-preview
        [previewData]="passageForPreview"
        *ngIf="showPassage"
      ></app-passage-preview>

      <div class="mb-3">
        <label class="form-label" for="autoSizingInputGroup">Title</label>
        <input
          type="text"
          class="form-control"
          name="reference"
          [(ngModel)]="defaultItemProperties.reference"
          placeholder="Title"
        />
      </div>

      <div *ngIf="editData && editData.itemPassage" class="mb-2 border">
        <label class="form-label" for="autoSizingInputGroup">Passage</label>
        <div class="border p-4" [innerHTML]="editData.itemPassage"></div>
      </div>

      <div class="mb-3">
        <label>Compose Question</label>
        <editor
          name="stimulus"
          [(ngModel)]="defaultItemProperties.stimulus"
          [init]="{
            branding: false,
            base_url: '/tinymce',
            height: 200,
            suffix: '.min',
            menubar: true,
            plugins:
              'table quickbars lists autoresize charmap paste code eqneditor',
            paste_preprocess: preProcess,
            setup: setup,
            quickbars_insert_toolbars: false,
            toolbar:
              'undo redo | formatselect | bold italic underline eqneditor | subscript superscript | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | table quickimage quicklink equation-editor | code charmap'
          }"
        ></editor>
      </div>

      <div class="d-flex justify-content-end">
        <div class="form-check">
          <label class="form-check-label"> Enable Numeric Answer </label>
          <input
            class="form-check-input"
            type="checkbox"
            name="numerical"
            [(ngModel)]="defaultItemProperties.numerical"
          />
        </div>
      </div>

      

      <div *ngIf="defaultItemProperties.numerical === false" class="mb-3">
        <label class="form-label">Text Answer</label>
        <input
          type="text"
          name="textOption"
          class="form-control"
          placeholder="please enter the correct answer"
          [(ngModel)]="defaultItemProperties.scoringOption.answers[0]"
        />
        <!-- <editor
          class="component-editor"
          [inline]="true"
          [init]="{
            height: 200,
            base_url: '/tinymce',
            suffix: '.min',
            menubar: true,
            plugins: 'table quickbars lists autoresize paste',
            paste_preprocess: preProcess,
            quickbars_insert_toolbars: false,
            toolbar:
              'undo redo | formatselect | bold italic underline | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent table quickimage quicklink'
          }"
          tagName="div"
          name="textOption"
          initialValue="textOption"
          [(ngModel)]=""
        ></editor> -->
      </div>

      <div *ngIf="defaultItemProperties.numerical === true" class="mb-3">
        <label class="form-label">Numeric Answer</label>
        <input
          type="number"
          name="numericOption"
          class="form-control"
          [(ngModel)]="defaultItemProperties.scoringOption.answers[0]"
        />
      </div>

      <div class="mb-3">
        <app-item-tag
        #tagRef
          [recievedTag]="tags"
          (sendTags)="recieveTag($event)"
        ></app-item-tag>
      </div>

      <div class="row g-3">
        <div class="col-sm-auto col-lg-6">
          <div class="form-check mb-3">
            <input
              class="form-check-input mb-2"
              type="checkbox"
              name="allowCopy"
              [(ngModel)]="defaultItemProperties.allowCopy"
             
            />
            <label class="form-check-label"> Allow copy </label>
          </div>
        </div>
        <!--end col-->
        <div class="col-sm-auto col-lg-6">
          <div class="form-check mb-3">
            <input
              class="form-check-input mb-2"
              type="checkbox"
              name="allowPaste"
             
            />
            <label class="form-check-label"> Allow paste </label>
          </div>
        </div>
        <!--end col-->
        <div class="col-sm-auto col-lg-6">
          <div class="form-check mb-3">
            <input
              class="form-check-input mb-2"
              type="checkbox"
              name="allowCut"
              [(ngModel)]="defaultItemProperties.allowCut"
             
            />
            <label class="form-check-label" for="allowCut"> Allow cut </label>
          </div>
        </div>
        <div class="col-sm-auto col-lg-6">
          <div class="form-check mb-3">
            <input
              class="form-check-input mb-2"
              type="checkbox"
              name="caseSensitive"
              [(ngModel)]="
                defaultItemProperties.scoringOption.caseSensitive
              "
            />
            <label class="form-check-label"> Case sensitive </label>
          </div>
        </div>
        <!--end col-->
        <div class="col-sm-auto col-lg-6">
          <div class="form-check mb-3">
            <input
              class="form-check-input mb-2"
              type="checkbox"
              name="ignoreLeadingAndTrailingSpaces"
              [(ngModel)]="
                defaultItemProperties.scoringOption
                  .ignoreLeadingAndTrailingSpaces
              "
            />
            <label class="form-check-label">
              Ignore leading and trailing spaces
            </label>
          </div>
        </div>
      </div>

      <div *ngIf="defaultItemProperties.numerical === false" class="row gy-4">
        <div class="col-xxl-12 col-md-12 col-sm-12">
          <label class="form-label">Max Length</label>
          <input
            type="number"
            min="1"
            class="form-control"
            placeholder="Score"
            name="maxLength"
            [(ngModel)]="defaultItemProperties.maxLength"
          />
        </div>
      </div>
    </div>
    <!--end row-->
  </div>
  <!-- end card -->

  <div class="card">
    <div class="live-preview">
      <ngb-accordion
        #acc="ngbAccordion"
        activeIds="static-1"
        [closeOthers]="true"
        class="custom-accordionwithicon accordion-border-box"
      >
        <ngb-panel id="static-1">
          <ng-template ngbPanelTitle class="accordion-header">
            <h2 class="accordion-header" id="gen-ques-headingOne">
              <button
                class="accordion-button"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#gen-ques-collapseOne"
                aria-expanded="false"
                aria-controls="gen-ques-collapseOne"
              >
                More options
              </button>
            </h2>
          </ng-template>
          <ng-template ngbPanelContent>
            <div class="accordion-body">
              <div class="live-preview">
                <div ngModelGroup="defaultItemProperties.scoringOption">
                  <div class="row gy-2 gx-3 mb-3 align-items-center">
                    <div class="col-sm-auto col-lg-6">
                      <label class="form-label">Score</label>
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Score"
                        name="score"
                        [(ngModel)]="defaultItemProperties.scoringOption.score"
                      />
                    </div>
                    <!--end col-->
                    <div class="col-sm-auto col-lg-6">
                      <label
                        for="choices-privacy-status-input"
                        class="form-label"
                        >Scoring Type</label
                      >
                      <select
                        class="form-select"
                        data-choices
                        data-choices-search-false
                        id="choices-privacy-status-input"
                        name="scoringType"
                        disabled
                        [(ngModel)]="
                          defaultItemProperties.scoringOption.scoringType
                        "
                      >
                        <option
                          *ngFor="let scoreType of scoringType"
                          value="{{ scoreType }}"
                        >
                          {{ scoreType }}
                        </option>
                      </select>
                    </div>
                    <!--end col-->
                    <div class="col-sm-auto col-lg-6">
                      <label for="matchingRule" class="form-label"
                        >Matching rule</label
                      >
                      <select
                        class="form-select"
                        data-choices
                        data-choices-search-false
                        name="matchingRule"
                        [(ngModel)]="
                          defaultItemProperties.scoringOption.matchingRule
                        "
                      >
                        <option
                          *ngFor="let match of matchingRule"
                          value="{{ match }}"
                        >
                          {{ match }}
                        </option>
                      </select>
                    </div>
                    <!--end col-->
                    <div class="col-sm-auto col-lg-6">
                      <label class="form-label" for="autoSizingInputGroup"
                        >Penalty</label
                      >
                      <div class="input-group">
                        <input
                          type="number"
                          min="0"
                          class="form-control"
                          placeholder="penalty value"
                          name="penalty"
                          [(ngModel)]="
                            defaultItemProperties.scoringOption.penalty
                          "
                        />
                      </div>
                    </div>
                    <!--end col-->
                    <div class="col-sm-auto col-lg-6">
                      <label class="form-label">
                        Minimum score on attempt
                      </label>
                      <input
                        type="text"
                        class="form-control"
                        id="autoSizingInputGroup"
                        placeholder="Enter a score"
                        name="minimumScoreIfAttempted"
                        [(ngModel)]="
                          defaultItemProperties.scoringOption
                            .minimumScoreIfAttempted
                        "
                      />
                    </div>
                    <!--end col-->
                    <div class="col-sm-auto col-lg-6">
                      <label for="difficultyLevel" class="form-label"
                        >Difficulty level</label
                      >
                      <select
                        class="form-select"
                        data-choices
                        name="difficultyLevel"
                        [(ngModel)]="defaultItemProperties.difficultyLevel"
                      >
                        <option
                          *ngFor="let difficulty of difficultyLevel"
                          value="{{ difficulty }}"
                        >
                          {{ difficulty }}
                        </option>
                      </select>
                    </div>
                    <!--end col-->
                    <div class="col-sm-auto col-lg-6">
                      <div class="form-check mb-3">
                        <input
                          class="form-check-input mb-2"
                          type="checkbox"
                          name="autoScore"
                          [(ngModel)]="
                            defaultItemProperties.scoringOption.autoScore
                          "
                        />
                        <label class="form-check-label"> Auto Score </label>
                      </div>
                    </div>
                    <!--end col-->
                  </div>
                  <!--end row-->
                </div>
              </div>
            </div>
          </ng-template>
        </ngb-panel>
      </ngb-accordion>
    </div>
  </div>
  <!-- end card -->
</form>

<app-short-text-preview
  *ngIf="itemUtil.previewItem === true"
  [previewData]="previewData"
  (returnPreviewData)="returnData($event)"
></app-short-text-preview>

<ng-template #passageModal let-modal>
  <div class="modal-header d-flex justify-content-between">
    <h3>Passage</h3>
    <button
      type="button"
      class="btn btn-outline-danger"
      data-bs-dismiss="modal"
      (click)="modal.close('Close click')"
    >
      <i class="ri-close-line me-2 align-middle"></i>Close
    </button>
  </div>
  <div class="modal-body p-5">
    <div [innerHTML]=""></div>
  </div>
</ng-template>

<ng-template #rejectionModal let-modal>
  <div class="modal-body p-5">
    <form
      #questionRejectionForm="ngForm"
      (ngSubmit)="submitRejection(questionRejectionForm)"
    >
      <h4 class="text-center mb-4">Reason for Rejection</h4>
      <p class="text-muted text-center">
        provide a reason why you have rejected the question.
      </p>
      <div class="row mb-2">
        <label>Reason</label>
        <editor
          name="reason"
          [(ngModel)]="newRejectionReason.reason"
          initialValue="reason(s)...."
          [init]="{
            base_url: '/tinymce',
            height: 200,
            suffix: '.min',
            menubar: true,
            plugins: 'table quickbars lists autoresize',
            quickbars_insert_toolbars: false,
            branding: false,
            toolbar:
              'undo redo | formatselect | bold italic underline | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent table quickimage quicklink'
          }"
        ></editor>
      </div>

      <div class="d-flex gap-2 float-end mt-4">
        <button
          type="button"
          class="btn btn-outline-primary d-flex gap-1 align-items-center"
          data-bs-dismiss="modal"
          (click)="modal.close('Close click')"
        >
          <i class="ri-close-line"></i>Close
        </button>
        <button
        *ngIf="!processingRejection"
          type="submit"
          class="btn btn-danger d-flex gap-1 align-items-center"
        >
          <i class=" las la-file-excel"></i>Reject
        </button>

        <ng-template [ngIf]="processingRejection">
          <button
            class="btn btn-outline-success btn-load"
            [disabled]="processingRejection"
          >
            <span class="d-flex align-items-center">
              <span class="spinner-border flex-shrink-0" role="status">
                <span class="visually-hidden">Saving...</span>
              </span>
              <span class="flex-grow-1 ms-2"> Saving... </span>
            </span>
          </button>
        </ng-template>
      </div>
    </form>
  </div>
</ng-template>

<ng-template #equationEditorModal [displayEquationEditor]>
  <div class="modal-body">
    <iframe
      src="http://localhost:4201"
      width="600px"
      height="500px"
      style="overflow: hidden"
    ></iframe>
  </div>
</ng-template>
