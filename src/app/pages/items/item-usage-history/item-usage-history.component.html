<app-breadcrumbs
  title="ITEM USAGE HISTORY"
  [breadcrumbItems]="breadCrumbItems"
></app-breadcrumbs>

<button class="btn mb-2 btn-outline-info" (click)="goBack()">
  <i class="ri ri-arrow-left-line"></i>Back
</button>

<div class="live-preview">
  <div class="row">
    <div class="table-responsive">
      <ngx-simplebar style="height: 45vh">
        <div class="card-body">
          <div class="row">
            <div class="mt-1 card card-animate p-0">
              <p-table
                [value]="itemUsageHistory"
                styleClass="p-datatable-customers"
                [rowHover]="true"
                responsiveLayout="scroll"
                #dt1
                dataKey="id"
              >
                <ng-template pTemplate="header">
                  <tr>
                    <th pSortableColumn="first_name">
                      <div
                        class="flex justify-content-between align-items-center"
                      >
                        S/N
                        <p-sortIcon field="first_name"></p-sortIcon>
                        <p-columnFilter
                          type="text"
                          field="first_name"
                          display="menu"
                          class="ml-auto"
                        ></p-columnFilter>
                      </div>
                    </th>
                    <th pSortableColumn="last_name">
                      <div
                        class="flex justify-content-between align-items-center"
                      >
                        EXAM NAME
                        <p-sortIcon field="last_name"></p-sortIcon>
                        <p-columnFilter
                          type="text"
                          field="last_name"
                          display="menu"
                          class="ml-auto"
                        ></p-columnFilter>
                      </div>
                    </th>

                    <th pSortableColumn="email">
                      <div
                        class="flex justify-content-between align-items-center"
                      >
                        DATE USED
                        <p-sortIcon field="email"></p-sortIcon>
                        <p-columnFilter
                          type="text"
                          field="email"
                          display="menu"
                          class="ml-auto"
                        ></p-columnFilter>
                      </div>
                    </th>

                    <!-- <th>
                      <div
                        class="flex justify-content-between align-items-center"
                      >
                        ACTIONS
                      </div>
                    </th> -->
                  </tr>
                </ng-template>
                >
                <ng-template pTemplate="body" let-usage let-rowIndex="rowIndex">
                  <tr>
                    <td>
                      <div
                        class="d-flex justify-content-start align-items-center"
                      >
                        <div class="flex-grow-3 ms-2">
                          {{ rowIndex + 1 }}
                        </div>
                      </div>
                    </td>

                    <td>
                      <div
                        class="d-flex justify-content-start align-items-center"
                      >
                        <div class="flex-grow-3 ms-2">
                          {{ usage.assessmentName }}
                        </div>
                      </div>
                    </td>

                    <td>{{ usage.usedAt | date : "medium" }}</td>

                    <td>
                      <div class="dropdown" ngbDropdown>

                  </tr>
                </ng-template>
              </p-table>
            </div>
            <!--end col-->
          </div>
          <!--end row-->

      </ngx-simplebar>
    </div>
    <!--end col-->
  </div>
  <!--end row-->
