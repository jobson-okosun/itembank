<div class="mb-3">
  <label for="choices-multiple-default" class="form-label"
    >Tags <span *ngIf="status">({{ status }})</span></label
  >
  <ng-select
    [items]="tags$ | async"
    [multiple]="true"
    [disabled]="disabled"
    [minTermLength]="minLengthTerm"
    [trackByFn]="trackByFn"
    bindLabel="tagName"
    name="tag"
    (search)="showSelect($event)"
    [loading]="loadingTags"
    typeToSearchText="Enter tag name to search"
    [typeahead]="tagSearchInput$"
    [(ngModel)]="Tag"
    (ngModelChange)="sendTag(Tag)"
  >
    <ng-template ng-optgroup-tmp let-item="item">
      {{ item[0].tagName | uppercase }}
    </ng-template>
  </ng-select>
</div>
