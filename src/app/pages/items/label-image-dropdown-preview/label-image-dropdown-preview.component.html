<div *ngIf="previewData" class="card">
  <div class="card-body">
    <div>
      <div class="mb-4 border border-top-0 border-start-0 border-end-0 border-dashed">
        <div [innerHTML]="previewData.stimulus | htmlSanitizer"></div>
      </div>

      <div class="preview-container mb-4" #previewContainer>
        <div [style.width.px]="previewData.imageData?.width > 600 ? 600 : previewData.imageData?.width" style="position: relative;">
          <img #previewImage [style.width.px]="previewData.imageData?.width" [style.height.px]="previewData.imageData?.height" [src]="previewData.images[0].url" (load)="onPreviewImageLoad()" class="preview-image" alt="Preview Image"/>

          <div style="width: 100%; height: 100%; position: absolute; top: 0;left: 0;" class="border-2 border-dashed border-primary" >
              <div style="position: relative;width: 100%; height: 100%; ">
                <div *ngFor="let position of previewData.responsePositions; let i = index" class="preview-label" [style.left.%]="position.x" [style.top.%]="position.y">
                  <div class="d-flex gap-2 p-0 m-0 border-0 outline-0 bg-transparent">
                    <div class="pointer"></div>

                    <select class="form-select form-select-sm" name="" id="" style="width: 100px">
                      <option disabled selected>Select correct answer</option>
                      <option *ngFor="let response of previewData.possibleResponses[i].responses">{{ response }}</option>
                    </select>
                  </div>
                </div>
              </div>
          </div>
        </div>
      </div>
    </div>

    <hr />

    <div class="d-flex justify-content-between">
      <div class="form-check mt-1">
        <input
          class="form-check-input"
          type="checkbox"
          name="showAnswer"
          (change)="check()"
        />
        <label class="form-check-label">
          Show Answer
          <span
            *ngIf="previewData.scoringOption.answers.length < 1"
            class="text-danger"
            >No answer selected</span
          ></label
        >
      </div>

      <div class="d-flex gap-2 float-end flex-wrap">
        <button
          *ngIf="
            !currentUser.authorities.includes('MODERATOR') &&
            !assessmentActive &&
            !recycleComponentActive &&
            !previewData.passageId &&
            previewData.id &&
            component !== 'question_status' &&
            !isEditPreview
          "
          class="btn btn-sm btn-danger"
          type="button"
          (click)="
            openDeleteItemModal(deleteQuestionConfirmationModal, previewData.id)
          "
        >
          <i class="ri-delete-bin-2-fill align-middle fs-14"></i>Delete
        </button>
        <button
          *ngIf="
            !currentUser.authorities.includes('MODERATOR') &&
            !assessmentActive &&
            !recycleComponentActive &&
            previewData.id &&
            previewData.passageId &&
            component !== 'question_status' &&
            !isEditPreview
          "
          class="btn btn-sm btn-danger"
          type="button"
          (click)="
            openDeletePassageItemModal(
              deleteQuestionConfirmationModal,
              previewData.id
            )
          "
        >
          <i class="ri-delete-bin-5-fill align-middle fs-14"></i>Delete
        </button>
        <button
          *ngIf="
            !currentUser.authorities.includes('MODERATOR') &&
            !assessmentActive &&
            !recycleComponentActive &&
            component !== 'question_status'
          "
          type="button"
          class="btn btn-primary btn-sm"
          (click)="edit()"
        >
          <i class="ri-edit-fill align-middle fs-14"></i>Edit
        </button>
        <button
        *ngIf="
        currentUser.authorities.includes('MODERATOR') && 
        !assessmentActive &&
        previewData.itemStatus !== 'REJECTED' &&
        previewData.itemStatus !== 'PUBLISHED'
      "
          type="button"
          class="btn btn-outline-danger btn-sm"
          (click)="review()"
        >
          <!-- <i class="ri-edit-fill align-middle fs-14"></i> -->Review
        </button>
        <!-- <button
          *ngIf="currentUser.authorities.includes('ADMIN')"
          ngbTooltip="USAGE HISTORY"
          type="button"
          class="btn px-2 btn-icon btn-outline-info"
          (click)="openUsageHistoryModal(itemUsageModal, previewData.id)"
        >
          <i class="ri-history-line"></i>
        </button> -->
      </div>
    </div>
  </div>
</div>

<ng-template #deleteQuestionConfirmationModal let-modal>
  <div class="modal-body p-5">
    <h4 class="mb-4 text-center">Confirm Action Dialog</h4>
    <div class="row">
      <p class="text-center text-muted">
        Are you sure you want to delete this Question?
      </p>
    </div>
    <div class="d-flex justify-content-center gap-2 mt-2">
      <button
        type="button"
        (click)="modal.close('Close click')"
        class="btn btn-secondary"
      >
        No, Cancel
      </button>
      <button
        type="button"
        (click)="deleteItem()"
        class="btn btn-danger"
        *ngIf="!processing_delete && !assessmentActive"
      >
        Yes, Delete It
      </button>
      <ng-template [ngIf]="processing_delete">
        <button
          class="btn btn-outline-danger btn-load"
          [disabled]="processing_delete"
        >
          <span class="d-flex align-items-center">
            <span class="spinner-border flex-shrink-0" role="status">
              <span class="visually-hidden">Deleting...</span>
            </span>
            <span class="flex-grow-1 ms-2"> Deleting... </span>
          </span>
        </button>
      </ng-template>
    </div>
  </div>
</ng-template>
