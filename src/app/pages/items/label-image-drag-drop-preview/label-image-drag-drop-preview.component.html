<ng-container *ngIf="previewData">
  <div class="card">
    <div class="card-body">
    <div class="row">
      <div class="mb-4 border border-top-0 border-start-0 border-end-0 border-dashed">
        <div [innerHTML]="previewData.stimulus | htmlSanitizer"></div>
      </div>

       <div class="row mb-5">
          <div class="col-4">
            <div class="border">
              <div class="py-2 px-3 border border-top-0 border-start-0 border-end-0 border-dotted d-flex justify-content-between align-items-center gap-2">
                <h4 id="labels">Labels</h4>
              </div>
            </div>

            <div class="border" style="height: 500px;overflow-y: auto;">

                  this labels should be draggable to any input boxes on the right
                    <div class="p-1 bg-white rounded mb-2" *ngFor="let item of getCombinedLabels()" [innerHTML]="item.label"></div>
                </div> -->
               <div class="bg-soft-secondary p-3"
                cdkDropList
                #labelsList="cdkDropList"
                id="labelsList"
                [cdkDropListData]="labels"
                [cdkDropListConnectedTo]="connectedDropLists"
                (cdkDropListDropped)="drop($event)">
                <div class="p-2 bg-white rounded mb-2 border" *ngFor="let item of labels" cdkDrag [innerHTML]="item.label" style="cursor: grab"></div>
              </div>


            </div>
          </div>
          <div class="col-8" >
            <div class="d-flex align-items-center" style="height: 100%;">
              <div class="preview-container" #previewContainer [style.height.px]="previewData.imageData?.height">
                <div [style.width.px]="previewData.imageData?.width > 600 ? 600 : previewData.imageData?.width" style="position: relative;">
                  <img #previewImage [style.width.px]="previewData.imageData?.width" [style.height.px]="previewData.imageData?.height" [src]="previewData.images[0].url" (load)="onPreviewImageLoad()" class="preview-image" alt="Preview Image"/>

                  <div style="width: 100%; height: 100%; position: absolute; top: 0;left: 0;" class="border-2 border-dashed border-primary" >
                      <div style="position: relative;width: 100%; height: 100%; ">
                        <div *ngFor="let position of previewData.responsePositions; let i = index" class="preview-label" [style.left.%]="position.x" [style.top.%]="position.y">
                          <div class="d-flex gap-2 p-0 m-0 border-0 outline-0 bg-transparent">
                            <div class="pointer"></div>

                            <!-- DROP TARGET -->
                            <ng-container *ngIf="!showAnswer">
                              <div class="form-control form-control-sm" style="max-width: 200px; min-width: 100px; border-style: dashed;" 
                              cdkDropList
                              #zone="cdkDropList"
                              [id]="'zone-' + i"
                              [cdkDropListData]="dropZones[i]"
                              [cdkDropListConnectedTo]="connectedDropLists"
                              (cdkDropListDropped)="drop($event)"

                              >
                                  <div *ngFor="let item of dropZones[i]" cdkDrag [innerHTML]="item.label"></div>
                                </div>
                            </ng-container>

                            <ng-container *ngIf="showAnswer">
                              <div class="form-control form-control-sm" style="max-width: 200px; min-width: 100px; border-style: dashed;">
                                  <div [innerHTML]="this.previewData.options[i].label"></div>
                                </div>
                            </ng-container>

                          </div>
                        </div>

                              disabled
                            ></span>
                          </div>
                        </div> -->
                      </div>

    <div class="d-flex justify-content-between">
      <div class="form-check mt-1">

        />
        <label class="form-check-label">
          Show Answer

<ng-template #deleteQuestionConfirmationModal let-modal>
  <div class="modal-body p-5">
    <h4 class="mb-4 text-center">Confirm Action Dialog</h4>
    <div class="row">
      <p class="text-center text-muted">
        Are you sure you want to delete this Question?
      </p>
    </div>
    <div class="d-flex justify-content-center gap-2 mt-2">
      <button
        type="button"
        (click)="modal.close('Close click')"
        class="btn btn-secondary"
      >
        No, Cancel
      </button>
      <button
        type="button"
        (click)="deleteItem()"
        class="btn btn-danger"
        *ngIf="!processing_delete && !assessmentActive"
      >
        Yes, Delete It
      </button>
      <ng-template [ngIf]="processing_delete">
        <button
          class="btn btn-outline-danger btn-load"
          [disabled]="processing_delete"
        >
          <span class="d-flex align-items-center">
            <span class="spinner-border flex-shrink-0" role="status">
              <span class="visually-hidden">Deleting...</span>
            </span>
            <span class="flex-grow-1 ms-2"> Deleting... </span>
          </span>
        </button>
      </ng-template>
    </div>
  </div>
</ng-template>
