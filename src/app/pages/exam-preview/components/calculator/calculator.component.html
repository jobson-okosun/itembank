<ng-container *ngIf="checkForCalculatorUsage() == true">
  <div
    [ngbTooltip]="'Calculator'"
    triggers="mouseenter:mouseleave"
    ngbDropdown
  >
    <btn
      class="btn btn-sm btn-soft-success"
      data-bs-toggle="dropdown"
      ngbDropdownToggle
      style="padding: 0px 5px"
    >
      <i class="mdi mdi-calculator-variant" style="font-size: 30px"></i>
    </btn>

    <div class="dropdown-menu-xl-end dropdown-menu-xl p-1 mx-3" ngbDropdownMenu>
      <ngx-simplebar class="mx-n4 px-4">
        <div class="row">
          <div class="col-lg-12 col-md-12 col-sm-12">
            <!-- <h5 class="mb-3">Default Tabs</h5> -->
            <div class="card">
              <div class="card-body">
                <div class="">
                  <div class="jumbotron p-2 m-0 bg-inverse">
                    <div class="input-group input-group-sm col-sm-12 m-0 p-0">
                      <div
                        class="col-sm-12 form-control text-lg-right"
                        type="text"
                        style="height: 40px"
                      >
                        {{ input }}
                      </div>
                    </div>

                    <div class="col-sm-12 p-1 m-0">
                      <button
                        class="btn btn-info col-sm-6"
                        type="button"
                        (click)="allClear()"
                      >
                        C
                      </button>
                      <button
                        class="btn btn-warning col-sm-3"
                        type="button"
                        (click)="clear()"
                      >
                        DEL
                      </button>
                      <button
                        class="btn btn-secondary col-sm-3"
                        type="button"
                        (click)="pressOperator('/')"
                      >
                        /
                      </button>
                    </div>

                    <div class="col-sm-12 p-1 m-0">
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('7')"
                      >
                        7
                      </button>
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('8')"
                      >
                        8
                      </button>
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('9')"
                      >
                        9
                      </button>
                      <button
                        class="btn btn-lg btn-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressOperator('*')"
                      >
                        X
                      </button>
                    </div>
                    <div class="col-sm-12 p-1 m-0">
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('4')"
                      >
                        4
                      </button>
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('5')"
                      >
                        5
                      </button>
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('6')"
                      >
                        6
                      </button>
                      <button
                        class="btn btn-lg btn-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressOperator('-')"
                      >
                        -
                      </button>
                    </div>
                    <div class="col-sm-12 p-1 m-0">
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('1')"
                      >
                        1
                      </button>
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('2')"
                      >
                        2
                      </button>
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('3')"
                      >
                        3
                      </button>
                      <button
                        class="btn btn-lg btn-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressOperator('+')"
                      >
                        +
                      </button>
                    </div>
                    <div class="col-sm-12 p-1 m-0">
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('.')"
                      >
                        .
                      </button>
                      <button
                        class="btn btn-lg btn-outline-secondary col-sm-3 p-1"
                        type="button"
                        (click)="pressNum('0')"
                      >
                        0
                      </button>
                      <button
                        class="btn btn-lg btn-success col-sm-6 p-1"
                        type="button"
                        (click)="getAnswer()"
                      >
                        =
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </ngx-simplebar>
    </div>
  </div>
</ng-container>
