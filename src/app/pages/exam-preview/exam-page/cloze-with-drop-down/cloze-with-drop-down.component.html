<div class="px-3">
  <div class="card card-body question-card" style="height: 62vh">
    <div class="text-primary d-flex justify-content-between">
      <span class="fw-bold"> Question {{ currentQuestionNumber + 1 }} </span>
      <app-revisit-button
        [questionNumber]="currentQuestionNumber"
      ></app-revisit-button>
    </div>
    <ngx-simplebar style="height: 420px; overflow-x: hidden">
      <div class="row mt-3">
        <div class="col d-flex">
          <div class="col-lg-12 col-md-12 col-sm-12">
            <span
              class="mt-3"
              [innerHtml]="this.currentQuestion.passage_stimulus"
            >
              <!-- {{ }} -->
            </span>
            <span
              class="fw-normal"
              *ngFor="let item of clozeRenderArray; let i = index"
            >
              <span
                [innerHtml]="
                  item.text.replaceAll('<p>', '').replaceAll('</p>', '')
                "
              ></span>

              <ng-container>
                <select
                  class="form-select-sm mt-0 m-2"
                  *ngIf="item.dropBox == true"
                  aria-label=".form-select-sm"
                  #dropBoxRef
                  (change)="captureResponses(i, dropBoxRef.value)"
                >
                  <option selected disabled>Select answer</option>

                  <option
                    [selected]="
                      currentQuestion.responses[i] &&
                      currentQuestion.responses[i].trim() === response.trim()
                    "
                    *ngFor="
                      let response of currentQuestion.possible_responses[i]
                        .responses
                    "
                  >
                    {{ response }}
                  </option>
                </select>
              </ng-container>
            </span>
          </div>
        </div>
      </div>
    </ngx-simplebar>
  </div>
</div>
