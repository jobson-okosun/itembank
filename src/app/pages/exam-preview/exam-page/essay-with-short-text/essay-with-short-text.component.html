<ngx-simplebar>
  <!-- style="overflow-y: scroll; height: 420px" -->
  <div class="px-3">
    <div class="d-flex row">
      <div class="col-lg-6">
        <div class="card card-body question-card py-1" style="height: 62vh">
          <div class="text-primary d-flex justify-content-between">
            <span class="fw-bold py-lg-2"
              >Question {{ currentQuestionNumber + 1 }}</span
            >
            <!-- <app-revisit-button
              [questionNumber]="currentQuestionNumber"
            ></app-revisit-button> -->
          </div>
          <ngx-simplebar style="height: 45vh; overflow-x: hidden;">
            <span
              class="mt-3"
              [innerHtml]="this.getCurrentQuestion().passage_stimulus"
            >
              <!-- {{ }} -->
            </span>
            <p
              class="mt-3"
              [innerHtml]="this.getCurrentQuestion().stimulus"
            ></p>
          </ngx-simplebar>

          <div class="d-flex justify-content-end my-3">
            <app-calculator></app-calculator>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card" style="height: 62vh">
          <div class="card-body">
            <div class="d-flex justify-content-between">
              <h5 class="card-title mb-4 text-start text-primary">Answer</h5>
              <app-revisit-button
              [questionNumber]="currentQuestionNumber"
            ></app-revisit-button>
            </div>

            <div class="">
              <ngx-simplebar style="height: 50vh; overflow-x: hidden;">
                <div class="row">
                  <div class="col-lg-12">
                    <div class="">
                      <div class="">
                        <!-- <ngx-simplebar style="max-height:90%;" > -->
                        <div>
                          <div class="p-2">
                            <!-- <label for="exampleFormControlTextarea5" class="form-label">Answer</label> -->
                            <textarea
                              class="form-control"
                              style="width: 100%"
                              rows="12"
                              [(ngModel)]="getCurrentQuestion().responses[0]"
                              maxlength="{{
                                getCurrentQuestion().max_words
                                  ? getCurrentQuestion().max_words
                                  : ''
                              }}"
                              (keyup)="updateAttemptedQuestions()"
                            >
                            </textarea>
                          </div>
                        </div>
                        <p class="text-end" style="font-size: 12px">
                          Total Words: 0 | Word Limit: 0 Words
                        </p>
                        <!-- </ngx-simplebar> -->
                      </div>
                    </div>
                  </div>
                </div>
              </ngx-simplebar>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ngx-simplebar>
