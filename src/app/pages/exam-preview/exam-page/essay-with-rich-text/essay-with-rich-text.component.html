<ngx-simplebar>
  <!-- style="overflow-y: scroll; height: 420px" -->
  <div class="px-3">
    <div class="d-flex row">
      <div class="col-lg-6">
        <div class="card card-body question-card py-1" style="height: 62vh">
          <div class="text-primary d-flex justify-content-between">
            <span class="fw-bold py-lg-2"
              >Question {{ currentQuestionNumber + 1 }}</span
            >
            <!-- <span class="mx-lg-4 p-lg-2 btn text-primary"
            (click)="addToRevisit(currentQuestionNumber)"
              ><i class="ri-bookmark-line align-bottom "></i> Revisit Later</span
            > -->
            <!-- <app-revisit-button
              [questionNumber]="currentQuestionNumber"
            ></app-revisit-button> -->
          </div>
          <ngx-simplebar style="height: 40vh; overflow-x: hidden">
            <span
              class="mt-3 card-body"
              [innerHtml]="this.getCurrentQuestion().passage_stimulus"
            >
              <!-- {{ }} -->
            </span>
            <span
              [innerHtml]="this.getCurrentQuestion().stimulus"
              class="mt-3 card-body"
            >
            </span>
          </ngx-simplebar>
          <div class="d-flex justify-content-end my-3">
            <app-calculator></app-calculator>
          </div>
        </div>
      </div>

      <div class="col-lg-6" style="/* height: 440px; */">
        <div class="card" style="height: 62vh">
          <div class="card-body">
            <div class="">
              <div class="d-flex justify-content-between">
                <h5 class="card-title mb-4 text-start text-primary">Answer</h5>
                <app-revisit-button
                  [questionNumber]="currentQuestionNumber"
                ></app-revisit-button>
              </div>

              <div class="">
                <ngx-simplebar style="height: 45vh; overflow-x: hidden">
                  <div class="row">
                    <div class="col-lg-12">
                      <div class="">
                        <div class="">
                          <!-- <ngx-simplebar style="max-height:90%;" > -->
                          <editor
                            [init]="{
                              menubar: true,
                              base_url: '/tinymce',
                              suffix: '.min',
                              height: '300',
                              toolbar:
                                'undo redo | formatselect | bold italic backcolor | \
                                    alignleft aligncenter alignright alignjustify | \
                                    bullist numlist outdent indent | removeformat | help'
                            }"
                            [(ngModel)]="getCurrentQuestion().responses[0]"
                          >
                          </editor>

                          <!-- </ngx-simplebar> -->
                        </div>
                      </div>
                    </div>
                  </div>
                </ngx-simplebar>
              </div>
            </div>

            <p class="text-end" style="font-size: 12px">
              Total Words: 0 | Word Limit: 0 Words
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</ngx-simplebar>
