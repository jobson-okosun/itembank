<div class="card border border-light rounded-3 p-3">
  <div *ngIf="!blockType" class="fs-6 fw-bold">Question: {{ currentQuestionNumber }}</div>
  <div
    *ngIf="!blockType"
    class="mt-2 text-black"
    style="font-size: 0.895em"
    [innerHTML]="currentQuestion?.stimulus" 
  ></div>

  <div class="d-flex flex-column my-4 gap-1">
    <div
      *ngFor="let item of currentQuestion.options; let i = index"
      [ngClass]="{
        'border-success':
          currentQuestion.scoringOption.answers[0] == item.value,
        'border-gray':
          currentQuestion.scoringOption.answers[0] !== item.value
      }"
      class="card border m-0"
      style="padding: 10px"
    >
      <!-- tags -->
      <div
        class="mb-1 d-flex flex-col gap-1"
        *ngIf="
          item.value == currentQuestion.scoringOption.answers[0]
        "
      >
        <span
          *ngIf="item.value == currentQuestion.scoringOption.answers[0]"
          class="badge rounded-pill bg-success"
          style="font-size: 0.7em"
          >Correct Answer</span>
      </div>

      <!-- label -->
      <div
        class="fs-6 p-0 item-label"
        [innerHTML]="stripSpaceFormat(item.label)"
      ></div>
    </div>
  </div>
</div>
