<!-- auth-page wrapper -->
<div
  style="height: 100vh; overflow: hidden"
  class="auth-page-wrapper auth-bg-cover d-flex justify-content-center align-items-center min-vh-100"
>
  <div class="bg-overlay"></div>
  <!-- auth-page content -->
  <div
    class="auth-page-content overflow-hidden d-flex align-items-center border py-0"
    style="height: 100vh"
  >
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="card overflow-hidden border-0 m-0" style="background-color: #f4f4f4" >
            <div class="row g-0">
              <div class="col-lg-6">
                <div class="p-lg-5 p-3 mx-5 d-flex flex-column justify-content-center mt-5">
                  <div class="mt-sm-5 mb-4 text-white-50">
                    <div>
                      <a routerLink="/" class="d-inline-block auth-logo">
                        <img
                          src="/assets/logo/EXPryLogoHor.png"
                          alt=""
                          height="20"
                        />
                      </a>
                    </div>
                  </div>
                  <div>
                    <h5 class="text-primary">Welcome Back!</h5>
                    <!-- <p class="text-muted">Sign in to continue to Velzon.</p> -->
                  </div>

                  <div class="mt-2">
                    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                      <div class="mb-2">
                        <label for="username" class="form-label"
                          >Username</label
                        >
                        <input
                          type="text"
                          class="form-control"
                          id="username"
                          placeholder="Enter username"
                          formControlName="username"
                          [ngClass]="{
                            'is-invalid': checkSubmit && f['username'].errors
                          }"
                        />
                        <div
                          *ngIf="checkSubmit && f['username'].errors"
                          class="invalid-feedback"
                          align="left"
                        >
                          <div *ngIf="f['username'].errors['required']">
                            Username is required
                          </div>
                        </div>
                      </div>

                      <div class="mb-2">
                        <div class="float-end">
                          <a routerLink="/reset-password" class="text-muted"
                            >Forgot password?</a
                          >
                        </div>
                        <label class="form-label" for="password-input"
                          >Password</label
                        >
                        <div
                          class="position-relative auth-pass-inputgroup mb-3"
                        >
                          <input
                            [type]="fieldTextType ? 'text' : 'password'"
                            class="form-control pe-5"
                            placeholder="Enter password"
                            id="password-input"
                            formControlName="password"
                            [ngClass]="{
                              'is-invalid': checkSubmit && f['password'].errors
                            }"
                          />
                          <button
                            class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted"
                            type="button"
                            id="password-addon"
                          >
                            <i
                              class="mdi align-middle"
                              [ngClass]="{
                                'mdi-eye-off-outline': !fieldTextType,
                                'mdi-eye-outline': fieldTextType
                              }"
                              (click)="toggleFieldTextType()"
                            ></i>
                          </button>
                          <div
                            *ngIf="checkSubmit && f['password'].errors"
                            class="invalid-feedback"
                          >
                            <span *ngIf="f['password'].errors['required']"
                              >Password is required</span
                            >
                          </div>
                        </div>
                      </div>

                      <div *ngIf="error" class="mt-2">
                        <p
                          class="alert alert-danger alert-dismissible fade show"
                        >
                          {{ error_msg }}
                        </p>
                      </div>

                      <div class="mt-2">
                        <button
                          class="btn btn-success w-100"
                          type="submit"
                          [disabled]="submitted === true"
                        >
                          {{
                            submitted === false ? "Sign In" : "Signing in..."
                          }}
                        </button>
                      </div>

                      <!-- <div class="mt-3 text-center">
                        <div class="signin-other-title">
                          <h5 class="fs-13 mb-3 title">Or Sign In with</h5>
                        </div>

                        <div class="d-flex gap-2 justify-content-center">
                          <button
                            type="button"
                            style="width: 100%"
                            class="btn btn-outline-secondary btn-icon waves-effect waves-light"
                          >
                            <img
                              src="/assets/images/google-icon.svg"
                              alt=""
                              srcset=""
                              style="width: 20px"
                            />
                          </button>
                        </div>
                      </div> -->
                    </form>
                  </div>

                  <div class="mt-3 text-center">
                    <p class="mb-0">
                      Don't have an account ?
                      <a
                        routerLink="/account/sign-up"
                        class="fw-semibold text-primary text-decoration-underline"
                      >
                        Signup</a
                      >
                    </p>
                  </div>
                </div>
              </div>
              <!-- end col -->

              <div class="col-lg-6" style="background-color: #f4f4f4">
                <div class="p-lg-5 p-3 d-lg-block d-none d-lg-block">
                  <div class="d-flex justify-content-end align-items-center">
                    <img
                      src="assets/images/signup.png"
                      alt=""
                      style="max-width: 100%"
                    />
                  </div>
                </div>
              </div>
              <!-- end col -->
            </div>
            <!-- end row -->
          </div>
          <!-- end card -->
        </div>
        <!-- end col -->
      </div>
      <!-- end row -->
    </div>
    <!-- end container -->
  </div>
  <!-- end auth page content -->

  <!-- footer -->
  <!-- end Footer -->
</div>
<!-- end auth-page-wrapper -->
