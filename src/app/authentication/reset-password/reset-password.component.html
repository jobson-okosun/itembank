<div class="auth-page-wrapper pt-1">
  <!-- auth page bg -->
  <div class="auth-one-bg-position auth-one-bg auth-bg-cover" id="auth-particles">
    <div class="bg-overlay"></div>

    <div class="shape">
      <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink"
        viewBox="0 0 1440 120">
        <path d="M 0,36 C 144,53.6 432,123.2 720,124 C 1008,124.8 1296,56.8 1440,40L1440 140L0 140z"></path>
      </svg>
    </div>
  </div>

  <!-- auth page content -->
  <div class="auth-page-content d-flex align-items-center" style="height: 100vh;">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="text-center mt-sm-5 text-white-50">
            <!-- <div>
                <a routerLink="/" class="d-inline-block auth-logo">
                  <img
                    src="assets/images/exam-alpha-logo/EXWhiteHor.png"
                    alt=""
                    height="30"
                  />
                </a>
              </div> -->
            <p class="mt-3 fs-15 fw-medium">
              <!-- Premium Admin & Dashboard Template -->
            </p>
          </div>
        </div>
      </div>
      <!-- end row -->

      <div class="row justify-content-center ">
        <div class="col-md-8 col-lg-6 col-xl-5 ">
          <div class="card shadow" style="min-height: 500px; border-radius: 15px">
            <div class="card-body p-3">

              <ng-container *ngIf="step ===1">

                <div class="text-center">
                  <div class="text-white-50">
                    <div>
                      <a routerLink="/" class="d-inline-block auth-logo">
                        <img src="assets/logo/EXPryLogoHor.png" alt="" height="20" />
                      </a>
                    </div>
                  </div>
                  <h6 class="text-secondary fw-bold mt-5 text-uppercase">
                    Forgot Password?
                  </h6>
                  <p class="text-muted">Reset your account password</p>
                  <!-- <lord-icon
                                          src="https://cdn.lordicon.com/rhvddzym.json"
                                          trigger="loop"
                                          colors="primary:#00bd9d"
                                          class="avatar-xl">
                                      </lord-icon> -->
                </div>

                <div class="alert alert-borderless alert-warning text-center mb-2 mx-2" role="alert">
                  Enter your email and instructions will be sent to you!
                </div>
                <div class="p-2">
                  <form>
                    <div class="mb-4">
                      <label class="form-label">Email</label>
                      <input type="email" class="form-control" id="email" placeholder="Enter Email" [(ngModel)]="email"
                        name="email" />
                      <div class="invalid-feedback" align="left">
                        <div>Email is required</div>
                      </div>
                    </div>

                    <div [ngClass]="{'mt-2': hasError}" class="" #messageEl>
                      <p [ngClass]="{'alert alert-danger alert-dismissible fade show': hasError}"></p>
                    </div>

                    <div class="text-center mt-4">
                      <button [disabled]="!email || submitted" (click)="doPasswordReset()" class="btn btn-success w-100"
                        type="button">
                        <span *ngIf="submitted">Processing...</span>
                        <span *ngIf="!submitted">Send Reset Link</span>

                      </button>
                    </div>
                  </form>

                  <p class="mb-0 mt-4">
                    Wait, I remember my password...
                    <a routerLink="/auth/sign-in/" class="fw-semibold text-primary text-decoration-underline">
                      Click here
                    </a>
                  </p>
                  <!-- end form -->
                </div>
              </ng-container>

              <ng-container *ngIf="step === 2">
                <div class="row mt-3">
                  <div class="col-lg-12 mt-2 col-sm-12 col-md-12">
                    <p class="text-center text-primary fw-bolder">Mail sent successfully</p>
                    <div class="d-flex justify-content-center">
                      <img style="position: absolute" src="/assets/images/svg/success-check-mark.svg" alt=""
                        srcset="" />
                    </div>

                    <div class="d-flex justify-content-center" style="position: relative">
                      <img style="height: 409px" src="/assets/images/svg/registration-success.svg" alt="" srcset="" />
                    </div>

                    <div class="" style="
                        position: absolute;
                        bottom: 170px;
                        width: 100%;
                        left: 52px;
                      ">
                      <button (click)="openMailApp()" class="btn btn-primary w-75 text-center" style="width: 100%">
                        Go to mail
                      </button>
                    </div>
                  </div>
                </div>
              </ng-container>
            </div>


            <!-- end card body -->
          </div>
          <!-- end card -->

          <!-- <div class="mt-4 text-center">
              <p class="mb-0">
                Wait, I remember my password...
                <a
                  routerLink="/auth/signin/basic"
                  class="fw-semibold text-primary text-decoration-underline"
                >
                  Click here
                </a>
              </p>
            </div> -->
        </div>
      </div>
      <!-- end row -->
    </div>
    <!-- end container -->
  </div>
  <!-- end auth page content -->

  <!-- footer -->
  <footer class="footer">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <!-- <div class="text-center">
              <p class="mb-0 text-muted">
                &copy;
                <script>
                  document.write(new Date().getFullYear());
                </script>
                Velzon. Crafted with <i class="mdi mdi-heart text-danger"></i> by
                Themesbrand
              </p>
            </div> -->
        </div>
      </div>
    </div>
  </footer>
  <!-- end Footer -->
</div>
<!-- end auth-page-wrapper -->
